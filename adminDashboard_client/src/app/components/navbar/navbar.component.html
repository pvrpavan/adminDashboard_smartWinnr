<header class="navbar">
  <div class="navbar-left">
    <h2 class="page-title">Admin Dashboard</h2>
  </div>
  <div class="navbar-right">
    <div class="notification-area">
      <div class="notification-btn" (click)="toggleNotifications()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
      </div>

      <!-- Notification Panel -->
      <div class="notification-panel" *ngIf="showNotifications">
        <div class="notification-panel-header">
          <h3>Notifications</h3>
          <div class="notification-actions">
            <button class="btn-mark-read" (click)="markAllRead()" *ngIf="unreadCount > 0">Mark all read</button>
            <button class="btn-clear-all" (click)="clearAll()" *ngIf="notifications.length > 0">Clear all</button>
          </div>
        </div>
        <div class="notification-list" *ngIf="notifications.length > 0">
          <div
            class="notification-item"
            *ngFor="let notification of notifications"
            [class.unread]="!notification.read"
            (click)="markAsRead(notification.id)"
          >
            <div class="notification-icon-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path [attr.d]="getNotificationIcon(notification.type)"></path>
              </svg>
            </div>
            <div class="notification-content">
              <span class="notification-title">{{ notification.title }}</span>
              <span class="notification-message">{{ notification.message }}</span>
              <span class="notification-time">{{ getTimeAgo(notification.timestamp) }}</span>
            </div>
            <button class="notification-remove" (click)="removeNotification(notification.id, $event)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="notification-empty" *ngIf="notifications.length === 0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <p>No notifications yet</p>
        </div>
      </div>
    </div>

    <div class="user-menu" (click)="toggleDropdown()">
      <div class="avatar">{{ getInitials() }}</div>
      <div class="user-info">
        <span class="user-name">{{ user?.name || 'Admin' }}</span>
        <span class="user-role">{{ user?.role || 'admin' }}</span>
      </div>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [class.open]="showDropdown">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
    <div class="dropdown" *ngIf="showDropdown">
      <a class="dropdown-item" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </a>
    </div>
  </div>
</header>
